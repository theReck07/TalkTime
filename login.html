<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="theme-toggle" onclick="toggleTheme()">⚫️</div>

  <div class="auth-container">
    <div class="title1">Welcome to TalkTime!</div>
    <!-- <div class="subtitle">You’re in! Welcome 👋</div> -->

    

    <form>
      <input type="email" placeholder="Email or Username" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>

  <!-- <span>New to TalkTime?</span> -->
  <div class="register">
    <span>New to TalkTime?</span>
    <a class="link" href="register.html">Create an account</a>
  </div>  
    <a class="link" href="forgot-password.html">Forgot your password?</a>
  </div>

  <script src="js/theme.js"></script>
</body>
</html>
