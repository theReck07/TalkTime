<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkTime — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- 1. Ambient background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- 2. Theme toggle switch -->
  <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></div>

  <!-- 3. Auth card -->
  <div class="auth-card">

    <!-- 4. Brand -->
    <div class="brand">
      <div class="brand-icon">💬</div>
      <span class="brand-name">TalkTime</span>
    </div>

    <h1>Welcome back My Chat</h1>
    <p class="subtitle">Sign in to continue...</p>

    <!-- 5. Login form -->
    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">Email or Username</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="password" autocomplete="current-password" required />
        <span class="pw-toggle" onclick="togglePw('password', this)" title="Show / hide password">👁️</span>
      </div>

      <div class="row-meta">
        <label class="remember">
          <input type="checkbox" /> Remember me
        </label>
        <a class="forgot-link" href="forgot-password.html">Forgot password?</a>
      </div>

      <button class="btn-primary" type="submit" id="login-btn">Sign In</button>
    </form>

    <!-- 6. Divider -->
    <div class="divider">or continue with</div>

    <!-- 7. Google OAuth (wire up your own OAuth flow) -->
    <button class="btn-social" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.9 29.7 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.4-.2-2.7-.5-4z"/>
        <path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.1 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3c-7.7 0-14.4 4.4-17.7 11.7z"/>
        <path fill="#FBBC05" d="M24 45c5.5 0 10.5-1.9 14.3-5l-6.6-5.4C29.7 36.2 27 37 24 37c-5.7 0-10.5-3.1-12.2-7.6l-7 5.4C8 40.5 15.5 45 24 45z"/>
        <path fill="#EA4335" d="M44.5 20H24v8.5h11.7c-.6 2.2-2 4.1-3.9 5.5l6.6 5.4C41.8 36.1 45 30.5 45 24c0-1.4-.2-2.7-.5-4z"/>
      </svg>
      Continue with Google
    </button>

    <!-- 8. Footer -->
    <div class="auth-footer">
      New to TalkTime? <a href="register.html">Create an account →</a>
    </div>

  </div><!-- /.auth-card -->

  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
