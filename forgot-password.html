<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkTime — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- 1. Ambient background blobs (forgot palette) -->
  <div class="blob blob-fp-1"></div>
  <div class="blob blob-fp-2"></div>

  <!-- 2. Theme toggle -->
  <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></div>

  <!-- 3. Auth card -->
  <div class="auth-card">

    <!-- 4. Brand -->
    <div class="brand">
      <div class="brand-icon">💬</div>
      <span class="brand-name">TalkTime</span>
    </div>

    <!-- 5. Request form ── -->
    <div id="form-state">
      <div class="icon-wrap">🔑</div>
      <h1>Forgot password?</h1>
      <p class="subtitle">
        No worries — enter your email and we'll send you reset instructions right away.
      </p>

      <form onsubmit="handleReset(event)">
        <div class="field">
          <label for="reset-email">Email Address</label>
          <input
            type="email"
            id="reset-email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
        <button class="btn-primary" type="submit" id="submit-btn">Send Reset Link</button>
      </form>

      <a class="back-link" href="login.html"> Back to Sign In</a>
    </div>

    
    <div class="success-state" id="success-state">
      <span class="success-icon">📨</span>
      <h2>Check your inbox</h2>
      <p>
        We've sent a password reset link to <strong id="sent-email"></strong>.
        The link expires in <strong>15 minutes</strong>.
      </p>
      <div class="resend">
        Didn't get it? <a onclick="resend(event)">Resend email</a>
      </div>
      <a class="back-link" href="login.html" style="justify-content:center; margin-top:24px;">
        Back to Sign In
      </a>
    </div>

  </div>

  <script src="js/theme.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
